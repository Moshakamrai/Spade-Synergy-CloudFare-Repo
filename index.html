<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Spade Synergy</title>
    <style>
      /* Full-page background behind the game canvas + margins */
      html, body {
        margin: 0;
        height: 100%;
        background: #050510 url("website_bg_subtle.png") center center / cover no-repeat fixed;
      }
      /* Center the game canvas in the window */
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #unity-container {
        background: transparent !important;
        position: relative;
      }
      /* Make the loading screen blend with the bg instead of solid grey */
      #unity-canvas { background: transparent !important; display: block; }

      /* Custom always-visible fullscreen button (top-right of the game window) */
      #fs-toggle {
        position: absolute; top: 10px; right: 10px; z-index: 50;
        width: 38px; height: 38px;
        background: rgba(0, 20, 30, 0.6);
        border: 1px solid rgba(0, 245, 255, 0.5);
        border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all .2s;
        backdrop-filter: blur(4px);
      }
      #fs-toggle:hover { background: rgba(0, 245, 255, 0.18); box-shadow: 0 0 14px rgba(0,245,255,.35); }
      #fs-toggle svg { width: 20px; height: 20px; stroke: #00f5ff; fill: none; stroke-width: 2; }

      /* Minimal loading bar styling (replaces TemplateData/style.css) */
      #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); display: none; text-align: center; }
      #unity-logo { color: #00f5ff; font-family: sans-serif; font-size: 22px; letter-spacing: .2em; margin-bottom: 14px; }
      #unity-logo::after { content: "SPADE SYNERGY"; }
      #unity-progress-bar-empty { width: 240px; height: 12px; margin: 0 auto; background: rgba(255,255,255,.08); border: 1px solid rgba(0,245,255,.4); border-radius: 6px; overflow: hidden; }
      #unity-progress-bar-full { width: 0%; height: 100%; background: linear-gradient(90deg,#00f5ff,#b44fff); transition: width .2s; }
      #unity-footer { display: none; }   /* hide the default Unity footer; we have our own UI */
      #unity-warning { position: absolute; left: 50%; top: 10px; transform: translateX(-50%); z-index: 60; }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="fs-toggle" title="Fullscreen">
        <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Spade Synergy</div>
      </div>
    </div>
    <script src="networker.js"></script>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Spade Synergy CloudFare Repo.loader.js";
      var config = {
        dataUrl: buildUrl + "/Spade Synergy CloudFare Repo.data",
        frameworkUrl: buildUrl + "/Spade Synergy CloudFare Repo.framework.js",
        codeUrl: buildUrl + "/Spade Synergy CloudFare Repo.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Spade Synergy",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                loadingBar.style.display = "none";
                fullscreenButton.onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
                // Custom fullscreen button
                var fsToggle = document.querySelector("#fs-toggle");
                if (fsToggle) fsToggle.onclick = () => unityInstance.SetFullscreen(1);
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
